plugins {
    id 'java-library'
}

group = "com.javanauta.ts"
version = "1.0.0"

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }

    withSourcesJar()
    withJavadocJar()
}

dependencies {
    api "jakarta.validation:jakarta.validation-api:3.1.1"
}